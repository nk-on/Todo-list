<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Todo list</title>
    <link rel="stylesheet" href="src/style.css" />
    <script type="module" src="src/projectCreation.js" defer></script>
    <script type="module" src="src/UI.js"></script>
    <script type="module" src="src/taskCreation.js"></script>
  </head>
  <body>
    <header>
      <h1>Todo-List</h1>
    </header>
    <main>
      <aside>
        <button data-home-button>Home</button>
        <div class="buttons">
          <button class="Create-project" data-create-project>+ Add project</button>
          <button class="edit-button" data-edit-project>Edit project</button>
          <button class="delete-project" data-delete-project>Delete project</button>
        </div>
        <dialog class="Create-project-dialog">
            <form data-project-form>
            <span class = "close-project-dialog">&#10005</span>
              <label for="name">Project description:</label>
              <input type="text" id="project-description" name="name" required />
              <button data-submit-project type="submit">Submit Project</button>
            </form>
        </dialog>
        <dialog class="edit-project-dialog">
          <form data-edit-project-form>
            <span class = "close-edit-project-dialog">&#10005</span>
            <label for="name">Project description:</label>
            <input type="text" id="edited-project-description" name="name" required />
            <button data-submit-editedProject type="submit">Edit Project</button>
          </form>
      </dialog>
         <section data-project-container></section>
      </aside>
      <section class="dashboard">
        <button class="Create-task">+Create task</button>
        <dialog class="Create-task-dialog" data-task-dialog>
          <form>
            <span class = "close-task-dialog">&#10005</span>
            <label for="name">Task description:</label>
            <input type="text" id="task-description" name="name" required />
            <label for="message">Due date:</label>
            <input type="date" id="date" name="name" required />
            <button type="submit">Submit</button>
          </form>
        </dialog>
        <section data-task-container></section>
      </section>
      <template id="project">
        <div id = "projectBox"data-project-box>
          <h2 data-title></h2>
        </div>
      </template>
      <template id="task">
        <div id="task" data-task-box>
          <h2 data-task-title></h2>
          <p data-task-dueDate></p>
        </div>
      </template>
      
    </main>
  </body>
</html>
